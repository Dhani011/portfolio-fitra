<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        /* CSS Navigasi & Body sama dengan About, sesuaikan active pada Skills */
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap");
        * { padding: 0; margin: 0; font-family: "Poppins", sans-serif; box-sizing: border-box; }
        body { width: 100%; min-height: 100vh; background: #020205 url("./img/background.png"); background-size: cover; background-attachment: fixed; color: white; }
        
        nav { position: fixed; top: 0; width: 100%; background: rgba(2, 2, 5, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 162, 255, 0.3); z-index: 1000; height: 10vh; display: flex; align-items: center; }
        .nav-container { width: 100%; display: flex; justify-content: space-around; align-items: center; }
        .logo { color: white; font-size: 2rem; font-weight: bold; }
        .logo span { color: #00a2ff; }
        .nav-container .links a { font-size: 1.2rem; color: white; margin: 0 20px; text-decoration: none; }
        .nav-container .links .active a { color: #00a2ff; border-bottom: 2px solid #00a2ff; }

        .skills-container { padding: 15vh 2rem 5rem; width: 100%; display: flex; justify-content: center; }
        .skills-content { width: 90%; max-width: 1200px; background: rgba(0, 0, 0, 0.75); border-radius: 20px; padding: 3rem; border: 1px solid rgba(0, 162, 255, 0.2); }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .skill-category { background: rgba(0, 162, 255, 0.05); padding: 2rem; border-radius: 15px; border: 1px solid rgba(0, 162, 255, 0.1); }
        
        .progress-bar { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress { height: 100%; background: #00a2ff; box-shadow: 0 0 10px #00a2ff; }

        .software-icons { display: flex; justify-content: center; flex-wrap: wrap; gap: 2rem; margin-top: 3rem; }
        .sw-item { display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .sw-item img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }

        .hamburg, .cancel { cursor: pointer; color: white; display: none; font-size: 2.5rem; }
        @media (max-width: 768px) { .nav-container .links { display: none; } .hamburg { display: block; position: absolute; right: 20px; } }
    </style>
    <title>Skills - Fitra Ramadhani</title>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Fitra <span>Ramadhani</span></div>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <div class="link active"><a href="skill.html">Skills</a></div>
                <a href="contact.html">Contact</a>
            </div>
        </div>
        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
    </nav>

    <div class="skills-container">
        <div class="skills-content">
            <h1 style="text-align: center; color: #00a2ff; margin-bottom: 3rem;">Technical Expertise</h1>
            <div class="skills-grid">
                <div class="skill-category" data-aos="fade-up">
                    <i class="fas fa-satellite-dish" style="font-size: 2rem; color: #00a2ff;"></i>
                    <h2>RF Engineering</h2>
                    <p>Simulation & Modeling</p>
                    <div class="progress-bar"><div class="progress" style="width: 90%;"></div></div>
                </div>
            </div>

            <div class="software-mastery" style="margin-top: 4rem; text-align: center;">
                <h2>Software Mastery</h2>
                <div class="software-icons">
                    <div class="sw-item" data-aos="zoom-in"><img src="img/CST.jpeg" alt="CST"><span>CST Studio</span></div>
                    <div class="sw-item" data-aos="zoom-in"><img src="img/MATLAB.jpeg" alt="MATLAB"><span>MATLAB</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0 });
        function hamburg() { /* sama dengan file lain */ }
    </script>
</body>
</html>
