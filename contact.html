<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap");

        * {
            padding: 0;
            margin: 0;
            font-family: "Poppins", sans-serif;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-image: url("./img/background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
            background-color: #020205;
        }

        /* Navigasi Sticky & Berwarna */
        nav {
            width: 100%;
            height: 10vh;
            position: fixed;
            top: 0;
            z-index: 1000;
            background: rgba(2, 2, 5, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 162, 255, 0.3);
            display: flex;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .logo span {
            color: #00a2ff;
            text-shadow: 0 0 10px rgba(0, 162, 255, 0.7);
        }

        .hamburg, .cancel {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
            color: white;
            display: none;
            font-size: clamp(2.5rem, 0.5rem + 5vw, 3rem);
        }

        .nav-container .links {
            display: flex;
        }

        .nav-container .links a {
            font-size: 1.2rem;
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-weight: 550;
            transition: 0.3s linear;
        }

        .nav-container .links a:hover, .nav-container .links .active {
            color: #00a2ff;
            border-bottom: 2px solid #00a2ff;
        }

        .dropdown {
            z-index: 1000;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            transform: translateY(-500px);
            width: 100%;
            height: auto;
            backdrop-filter: blur(8px) brightness(40%);
            box-shadow: 0 0 20px black;
            transition: 0.3s ease-in-out;
        }

        .dropdown .links a {
            display: flex;
            color: white;
            text-decoration: none;
            padding: 15px 0;
            justify-content: center;
            align-items: center;
        }

        .dropdown .links a:hover {
            background-color: #00a2ff;
        }

        /* Contact Section Styles */
        .contact-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12vh 2rem 2rem; /* padding-top disesuaikan dengan tinggi nav */
        }

        .contact-content {
            width: 90%;
            max-width: 1100px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 3.5rem;
            color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            border: 1px solid rgba(0, 162, 255, 0.2);
        }

        .contact-header h1 {
            font-size: 2.8rem;
            color: #00a2ff;
            text-shadow: 0 0 15px rgba(0, 162, 255, 0.5);
            margin-bottom: 1rem;
        }

        .contact-header p {
            color: #e0e0e0;
            margin-bottom: 2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .contact-icon {
            width: 55px;
            height: 55px;
            background: rgba(0, 162, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 1.2rem;
            border: 1px solid rgba(0, 162, 255, 0.3);
        }

        .contact-icon i {
            font-size: 1.6rem;
            color: #00a2ff;
        }

        .contact-text h3 {
            font-size: 1.1rem;
            color: #00a2ff;
            margin-bottom: 0.2rem;
        }

        .contact-text p {
            color: #ffffff;
            font-size: 0.95rem;
        }

        /* Form Styling */
        .contact-form form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 162, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group textarea {
            height: 150px;
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00a2ff;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group label {
            position: absolute;
            left: 1rem;
            top: 1.2rem;
            color: #aaaaaa;
            transition: 0.3s;
            pointer-events: none;
        }

        .form-group input:focus~label,
        .form-group input:valid~label,
        .form-group textarea:focus~label,
        .form-group textarea:valid~label {
            top: -0.6rem;
            left: 0.8rem;
            font-size: 0.8rem;
            padding: 0 0.5rem;
            background: #020205;
            color: #00a2ff;
        }

        .submit-btn {
            padding: 1.2rem;
            background: #00a2ff;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 162, 255, 0.5);
        }

        .social-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.2rem;
        }

        .social-links a {
            width: 45px;
            height: 45px;
            background: rgba(0, 162, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00a2ff;
            transition: 0.3s;
            border: 1px solid rgba(0, 162, 255, 0.2);
            text-decoration: none;
        }

        .social-links a:hover {
            background: #00a2ff;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.4);
        }

        @media (max-width: 992px) {
            .contact-content { grid-template-columns: 1fr; width: 95%; padding: 2rem; }
            .nav-container .links { display: none; }
            .hamburg { display: block; }
        }
    </style>
    <title>Contact - Fitra Ramadhani</title>
</head>

<body>
    <nav>
        <div class="nav-container">
            <div class="logo" data-aos="zoom-in" data-aos-duration="1500">
                Fitra <span>Ramadhani</span>
            </div>
            <div class="links">
                <div class="link" data-aos="fade-up" data-aos-delay="100"><a href="index.html">Home</a></div>
                <div class="link" data-aos="fade-up" data-aos-delay="200"><a href="about.html">About</a></div>
                <div class="link" data-aos="fade-up" data-aos-delay="300"><a href="skill.html">Skills</a></div>
                <div class="link active" data-aos="fade-up" data-aos-delay="500"><a href="contact.html">Contact</a></div>

        </div>
        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        <div class="dropdown">

                <a href="about.html">About</a>

    <div class="contact-container">

                </div>

<div class="social-links" data-aos="fade-up" data-aos-delay="600">

        <i class="fa-brands fa-linkedin"></i>

            </div>

            <div class="contact-form" data-aos="fade-left" data-aos-duration="1500">
            <form action="https://formspree.io/f/xojrryvw" method="POST">
                <input type="text" name="_gotcha" style="display:none" />

            <div class="form-group">

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0, });
        // Tambahkan fungsi hamburg & cancel di sini atau di script.js Anda
        function hamburg() { document.querySelector(".dropdown").style.transform = "translateY(0px)"; }
        function cancel() { document.querySelector(".dropdown").style.transform = "translateY(-500px)"; }
    </script>
    <script src="./js/script.js"></script>

</html>
