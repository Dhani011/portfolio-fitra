<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        /* CSS Navigasi & Body sama dengan file lain */
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap");
        * { padding: 0; margin: 0; font-family: "Poppins", sans-serif; box-sizing: border-box; }
        body { background: #020205 url("./img/background.png") fixed; color: white; }

        .contact-container { padding: 15vh 2rem 2rem; display: flex; justify-content: center; }
        .contact-content { width: 90%; max-width: 1100px; background: rgba(0,0,0,0.75); padding: 3rem; border-radius: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; border: 1px solid rgba(0,162,255,0.2); }
        
        .form-group { position: relative; margin-bottom: 1.5rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,162,255,0.2); border-radius: 10px; color: white; outline: none; }
        .form-group label { position: absolute; left: 1rem; top: 1rem; color: #aaa; transition: 0.3s; pointer-events: none; background: #0b0b0d; padding: 0 5px; }
        
        .form-group input:focus~label, .form-group input:valid~label { top: -10px; font-size: 0.8rem; color: #00a2ff; }
        .submit-btn { width: 100%; padding: 1rem; background: #00a2ff; border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { box-shadow: 0 0 20px rgba(0,162,255,0.5); transform: translateY(-3px); }

        @media (max-width: 992px) { .contact-content { grid-template-columns: 1fr; } }
    </style>
    <title>Contact - Fitra Ramadhani</title>
</head>
<body>
    <!-- Navbar sama dengan file lain, active pada Contact -->
    <div class="contact-container">
        <div class="contact-content">
            <div class="contact-info" data-aos="fade-right">
                <h1>Connect with Me</h1>
                <p>fitra30ramadhani@gmail.com</p>
                <div class="social-links" style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <a href="#" style="color: #00a2ff; font-size: 1.5rem;"><i class="fab fa-linkedin"></i></a>
                    <a href="#" style="color: #00a2ff; font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
                </div>
            </div>

            <div class="contact-form" data-aos="fade-left">
                <form action="https://formspree.io/f/xojrryvw" method="POST">
                    <div class="form-group"><input type="text" name="name" required><label>Your Name</label></div>
                    <div class="form-group"><input type="email" name="email" required><label>Your Email</label></div>
                    <div class="form-group"><textarea name="message" required style="height: 150px;"></textarea><label>Message</label></div>
                    <button type="submit" class="submit-btn">Send Inquiry</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
