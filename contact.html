<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap");

        * {
            padding: 0;
            margin: 0;
            font-family: "Poppins", sans-serif;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-image: url("./img/background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
            background-color: #020205;
        }

        /* Navigasi Sticky & Berwarna */
        nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 80px; /* Tinggi tetap agar layout stabil */
    background: rgba(2, 2, 5, 0.9); 
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(0, 162, 255, 0.2);
    z-index: 2000; /* Z-index tinggi agar selalu di atas */
    display: flex;
    align-items: center;
}

.nav-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between; /* Lebih rapi untuk mobile */
    align-items: center;
    padding: 0 5%;
}

.logo {
    color: white;
    font-size: 2rem;
    font-weight: bold;
    cursor: default;
}

.logo span {
    color: #00a2ff;
    text-shadow: 0 0 15px rgba(0, 162, 255, 0.8);
}

/* --- Menu Desktop --- */
.nav-container .links {
    display: flex;
    align-items: center;
}

.nav-container .links a {
    font-size: 1.1rem;
    color: white;
    margin-left: 40px;
    text-decoration: none;
    font-weight: 550;
    transition: 0.3s ease;
    position: relative;
}

.nav-container .links a:hover,
.nav-container .links .active a {
    color: #00a2ff;
}

/* --- Hamburger & Cancel Icons --- */
.hamburg, .cancel {
    cursor: pointer;
    color: white;
    font-size: 2.5rem;
    display: none; /* Sembunyi di desktop */
    transition: 0.3s;
}

/* --- Mobile Dropdown Overlay --- */
.dropdown {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh; /* Full screen di mobile */
    background: rgba(2, 2, 5, 0.98);
    backdrop-filter: blur(15px);
    z-index: 3000; /* Di atas segalanya */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transform: translateY(-100%); /* Sembunyi di atas layar */
    transition: 0.5s cubic-bezier(0.6, 0.05, 0.01, 0.9);
}

/* Class ini akan dipicu oleh JS (dropdown.classList.add('active')) */
.dropdown.active {
    transform: translateY(0);
}

.dropdown .links {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    text-align: center;
}

.dropdown .links a {
    color: white;
    text-decoration: none;
    font-size: 2rem;
    font-weight: 600;
    transition: 0.3s;
}

.dropdown .links a:hover {
    color: #00a2ff;
    transform: scale(1.1);
}

/* Tombol X di dalam dropdown */
.dropdown .cancel {
    display: block;
    position: absolute;
    top: 20px;
    right: 30px;
}

/* --- Responsive Media Query --- */
@media (max-width: 884px) {
    .nav-container .links {
        display: none; /* Sembunyikan menu desktop */
    }

    .hamburg {
        display: block; /* Munculkan tombol hamburger */
    }
}

        /* Contact Section Styles */
        .contact-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12vh 2rem 2rem; /* padding-top disesuaikan dengan tinggi nav */
        }

        .contact-content {
            width: 90%;
            max-width: 1100px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 3.5rem;
            color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            border: 1px solid rgba(0, 162, 255, 0.2);
        }

        .contact-header h1 {
            font-size: 2.8rem;
            color: #00a2ff;
            text-shadow: 0 0 15px rgba(0, 162, 255, 0.5);
            margin-bottom: 1rem;
        }

        .contact-header p {
            color: #e0e0e0;
            margin-bottom: 2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .contact-icon {
            width: 55px;
            height: 55px;
            background: rgba(0, 162, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 1.2rem;
            border: 1px solid rgba(0, 162, 255, 0.3);
        }

        .contact-icon i {
            font-size: 1.6rem;
            color: #00a2ff;
        }

        .contact-text h3 {
            font-size: 1.1rem;
            color: #00a2ff;
            margin-bottom: 0.2rem;
        }

        .contact-text p {
            color: #ffffff;
            font-size: 0.95rem;
        }

        /* Form Styling */
        .contact-form form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 162, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group textarea {
            height: 150px;
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00a2ff;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group label {
            position: absolute;
            left: 1rem;
            top: 1.2rem;
            color: #aaaaaa;
            transition: 0.3s;
            pointer-events: none;
        }

        .form-group input:focus~label,
        .form-group input:valid~label,
        .form-group textarea:focus~label,
        .form-group textarea:valid~label {
            top: -0.6rem;
            left: 0.8rem;
            font-size: 0.8rem;
            padding: 0 0.5rem;
            background: #020205;
            color: #00a2ff;
        }

        .submit-btn {
            padding: 1.2rem;
            background: #00a2ff;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 162, 255, 0.5);
        }

        .social-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.2rem;
        }

        .social-links a {
            width: 45px;
            height: 45px;
            background: rgba(0, 162, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00a2ff;
            transition: 0.3s;
            border: 1px solid rgba(0, 162, 255, 0.2);
            text-decoration: none;
        }

        .social-links a:hover {
            background: #00a2ff;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.4);
        }

        @media (max-width: 992px) {
            .contact-content { grid-template-columns: 1fr; width: 95%; padding: 2rem; }
            .nav-container .links { display: none; }
            .hamburg { display: block; }
        }
    </style>

    <script>
        AOS.init({ offset: 0, });
        // Tambahkan fungsi hamburg & cancel di sini atau di script.js Anda
        function hamburg() { document.querySelector(".dropdown").style.transform = "translateY(0px)"; }
        function cancel() { document.querySelector(".dropdown").style.transform = "translateY(-500px)"; }
        function hamburg() {
