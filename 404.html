<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Signal Lost | Fitra Ramadhani</title>
    
    <!-- Font & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap");

        :root {
            --bg-color: #020205;
            --main-color: #00a2ff;
            --text-color: #ffffff;
        }

        * {
            padding: 0;
            margin: 0;
            font-family: "Poppins", sans-serif;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: var(--bg-color);
            background-image: url("./img/background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        .error-section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.7); /* Overlay gelap agar teks terbaca */
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 2rem;
        }

        .error-section i {
            font-size: 8rem;
            color: var(--main-color);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0, 162, 255, 0.5);
            animation: pulse 2s infinite;
        }

        .error-section h1 {
            font-size: clamp(5rem, 10vw, 8rem);
            font-weight: 800;
            color: var(--text-color);
            line-height: 1;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .error-section h3 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--main-color);
            margin-bottom: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .error-section p {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 3rem;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn-box {
            display: flex;
            justify-content: center;
            width: 280px;
            height: 55px;
        }

        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: var(--main-color);
            border: .2rem solid var(--main-color);
            border-radius: .8rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-color);
            transition: .5s ease;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.3);
        }

        .btn:hover {
            background: transparent;
            color: var(--main-color);
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.5);
            transform: translateY(-3px);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <section class="error-section">
        <div data-aos="zoom-in" data-aos-duration="1000" style="display: flex; flex-direction: column; align-items: center;">
            <i class='bx bx-broadcast'></i>
            <h1>404</h1>
            <h3>[ SIGNAL LOST ]</h3>
            <p>Frekuensi yang Anda minta tidak terdeteksi oleh radar. Koneksi terputus karena URL yang salah atau halaman telah dipindahkan.</p>
            
            <div class="btn-box">
                <a href="index.html" class="btn">Re-establish Connection</a>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0 });
    </script>
</body>
</html>
